name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode with Swift 6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Test build settings
        run: ./scripts/test-build-settings.sh

      - name: Run core tests
        timeout-minutes: 8
        run: ./scripts/run-core-tests.sh

      - name: Build app
        run: xcodebuild build -project LiveNotes.xcodeproj -scheme LiveNotes -destination 'platform=macOS,arch=arm64'

      - name: Test UI evidence recorder
        run: ./scripts/test-record-ui-tests.sh

      - name: Install UI evidence dependencies
        run: brew install ffmpeg

      - name: Run UI evidence tests
        env:
          LIVENOTES_UI_MIN_VIDEO_SECONDS: "0"
        run: ./scripts/record-ui-tests.sh

      - name: Upload UI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livenotes-ui-evidence
          path: dist/ui-evidence
          if-no-files-found: error

      - name: Test dmg packaging script
        run: ./scripts/test-build-dmg.sh

      - name: Test release asset packaging
        run: ./scripts/test-package-release-assets.sh

      - name: Test Homebrew cask generator
        run: ./scripts/test-homebrew-cask.sh

      - name: Test release readiness guard
        run: ./scripts/test-release-readiness.sh
