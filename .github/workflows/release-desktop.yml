name: Build Offline DMG

on:
  workflow_dispatch:

jobs:
  macos-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode with Swift 6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run core tests
        run: cd LiveNotesCore && swift test

      - name: Build app
        run: xcodebuild build -project LiveNotes.xcodeproj -scheme LiveNotes -destination 'platform=macOS,arch=arm64'

      - name: Run UI tests
        run: ./scripts/run-ui-tests.sh

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: livenotes-ui-test-results
          path: dist/LiveNotesUITests.xcresult
          if-no-files-found: ignore

      - name: Test dmg packaging script
        run: ./scripts/test-build-dmg.sh

      - name: Test release asset packaging
        run: ./scripts/test-package-release-assets.sh

      - name: Test bundled artifact preparation script
        run: ./scripts/test-prepare-bundled-artifacts.sh

      - name: Prepare bundled models
        run: ./scripts/prepare-bundled-artifacts.sh "$RUNNER_TEMP/livenotes-artifacts"

      - name: Build desktop dmg
        id: build_dmg
        env:
          LIVENOTES_BUNDLED_ARTIFACT_SOURCE_ROOT: ${{ runner.temp }}/livenotes-artifacts
          LIVENOTES_RELEASE_NAME: LiveNotes-${{ github.ref_name }}
        run: |
          log_path="$(mktemp)"
          ./scripts/build-dmg.sh | tee "$log_path"
          dmg_path="$(tail -n 1 "$log_path")"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Package release assets
        run: ./scripts/package-release-assets.sh "${{ steps.build_dmg.outputs.dmg_path }}" "dist/release-assets"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: livenotes-macos-release-assets
          path: dist/release-assets/*
